name: Biweekly poetry scout

on:
  schedule:
    - cron: "0 8 1,15 * *"
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install anthropic pyyaml requests
      - name: Run SAPPHO D
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/scout_poems.py
      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sappho-d/${{ github.run_number }}
          title: "SAPPHO D wakes"
          body: "Poems found by SAPPHO D. Verify sources before merging."
          labels: scouted, needs-review
          draft: true
