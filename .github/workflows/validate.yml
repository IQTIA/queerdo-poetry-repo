name: Validate poem submissions

on:
  pull_request:
    paths:
      - "poems/**.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Validate poem files
        run: python scripts/validate_poems.py
